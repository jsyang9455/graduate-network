<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상담일지 - 전북지역 졸업생 네트워크</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/counseling.css">
    <style>
        .journal-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .journal-header-bar h1 {
            font-size: 1.5rem;
            color: #1e3a8a;
        }
        .journal-filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .journal-filters select,
        .journal-filters input {
            padding: 0.5rem 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.9rem;
            color: #374151;
        }
        .journal-list { display: flex; flex-direction: column; gap: 1rem; }
        .journal-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .journal-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }
        .journal-card-title { font-size: 1.05rem; font-weight: 600; color: #1f2937; }
        .journal-card-meta {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 0.35rem;
            font-size: 0.83rem;
            color: #6b7280;
        }
        .journal-type-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            background: #e0e7ff;
            color: #3730a3;
        }
        .journal-card-body { font-size: 0.9rem; color: #374151; line-height: 1.6; }
        .journal-card-followup {
            margin-top: 0.75rem;
            padding: 0.6rem 0.9rem;
            background: #f0fdf4;
            border-left: 3px solid #16a34a;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #15803d;
        }
        .journal-card-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .journal-card-actions button { padding: 0.35rem 0.8rem; font-size: 0.82rem; }
        .privacy-badge {
            font-size: 0.75rem;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            background: #fef3c7;
            color: #92400e;
        }
        /* 모달 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.open { display: flex; }
        .modal-content { background: #fff; border-radius: 12px; width: 90%; max-width: 620px; max-height: 90vh; overflow-y: auto; padding: 2rem; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-header h2 { font-size: 1.2rem; color: #1e3a8a; }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #6b7280; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 600; color: #374151; margin-bottom: 0.4rem; }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.9rem;
            box-sizing: border-box;
        }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem; }
        .empty-state { text-align: center; padding: 3rem; color: #6b7280; }
        .empty-state p { font-size: 1rem; }
        .page-content { padding: 2rem; }
    </style>
</head>
<body>
    <header id="mainHeader">
        <nav>
            <div class="logo">
                <img src="images/logo.png" alt="JJOBB" style="height: 40px;">
            </div>
            <ul class="nav-links">
                <li><a href="dashboard.html">대시보드</a></li>
                <li><a href="jobs.html">채용 정보</a></li>
                <li><a href="networking.html">JOB밴드</a></li>
                <li><a href="counseling.html" class="active">진로 상담</a></li>
                <li><a href="help.html">📚 도움말</a></li>
            </ul>
            <div class="user-menu">
                <span class="user-name" id="userName"></span>
                <button onclick="auth.logout()" class="btn-logout">로그아웃</button>
            </div>
        </nav>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-menu">
                <a href="index.html" class="menu-item"><span class="icon">🏠</span><span>홈</span></a>
                <a href="dashboard.html" class="menu-item"><span class="icon">📊</span><span>대시보드</span></a>
                <a href="profile.html" class="menu-item"><span class="icon">👤</span><span>내 프로필</span></a>
                <a href="jobs.html" class="menu-item"><span class="icon">💼</span><span>채용 정보</span></a>
                <a href="networking.html" class="menu-item"><span class="icon">🤝</span><span>JOB밴드</span></a>
                <a href="counseling.html" class="menu-item" id="counselingMenu"><span class="icon">💬</span><span>진로 상담</span></a>
                <a href="counseling-journal.html" class="menu-item active" id="journalMenu"><span class="icon">📓</span><span>상담일지</span></a>
                <a href="career.html" class="menu-item" id="careerMenu"><span class="icon">📈</span><span>경력 관리</span></a>
                <a href="education-programs.html" class="menu-item"><span class="icon">🎓</span><span>교육 프로그램</span></a>
                <div style="border-top: 1px solid #e5e7eb; margin: 1rem 0; padding-top: 1rem;">
                    <p style="padding: 0 1rem; color: #6b7280; font-size: 0.875rem; font-weight: 600;">공지사항</p>
                </div>
                <a href="job-fair.html" class="menu-item"><span class="icon">🏢</span><span>취업 박람회</span></a>
                <a href="industry-visit.html" class="menu-item"><span class="icon">🏭</span><span>산업체 견학</span></a>
                <a href="certification-support.html" class="menu-item"><span class="icon">📜</span><span>자격증 지원</span></a>
                <div id="adminMenuSection" style="display: none;">
                    <div style="border-top: 1px solid #e5e7eb; margin: 1rem 0; padding-top: 1rem;">
                        <p style="padding: 0 1rem; color: #6b7280; font-size: 0.875rem; font-weight: 600;">관리자 메뉴</p>
                    </div>
                    <a href="admin-users.html" class="menu-item"><span class="icon">👥</span><span>회원 관리</span></a>
                    <a href="admin-jobs.html" class="menu-item"><span class="icon">💼</span><span>채용공고 관리</span></a>
                    <a href="admin-board.html" class="menu-item"><span class="icon">📋</span><span>게시판 관리</span></a>
                    <a href="admin-codes.html" class="menu-item"><span class="icon">⚙️</span><span>코드 관리</span></a>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-content">
                <div class="journal-header-bar">
                    <div>
                        <h1>📓 상담일지</h1>
                        <p id="pageSubtitle" style="color:#6b7280; margin-top:0.3rem; font-size:0.9rem;">상담 내용을 기록하고 관리합니다.</p>
                    </div>
                    <button id="addJournalBtn" class="btn btn-primary" style="display:none;" onclick="openJournalModal()">+ 상담일지 작성</button>
                </div>

                <!-- 필터 -->
                <div class="journal-filters">
                    <select id="filterType" onchange="renderJournals()">
                        <option value="">전체 유형</option>
                        <option value="진로상담">진로상담</option>
                        <option value="취업상담">취업상담</option>
                        <option value="심리상담">심리상담</option>
                        <option value="학습상담">학습상담</option>
                        <option value="기타">기타</option>
                    </select>
                    <input type="text" id="filterSearch" placeholder="학생명 또는 제목 검색..." oninput="renderJournals()" style="min-width:200px;">
                </div>

                <!-- 일지 목록 -->
                <div id="journalList" class="journal-list">
                    <div class="empty-state"><p>상담일지를 불러오는 중...</p></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 상담일지 작성/수정 모달 -->
    <div id="journalModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="journalModalTitle">상담일지 작성</h2>
                <button class="modal-close" onclick="closeJournalModal()">&times;</button>
            </div>
            <form id="journalForm" onsubmit="saveJournal(event)">
                <input type="hidden" id="journalId">
                <div class="form-row">
                    <div class="form-group">
                        <label>상담 날짜 *</label>
                        <input type="date" id="journalDate" required>
                    </div>
                    <div class="form-group">
                        <label>상담 유형 *</label>
                        <select id="journalType" required>
                            <option value="">선택하세요</option>
                            <option value="진로상담">진로상담</option>
                            <option value="취업상담">취업상담</option>
                            <option value="심리상담">심리상담</option>
                            <option value="학습상담">학습상담</option>
                            <option value="기타">기타</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>학생 이름 *</label>
                    <input type="text" id="journalStudentName" placeholder="상담한 학생 이름" required>
                    <input type="hidden" id="journalStudentId">
                </div>
                <div class="form-group">
                    <label>상담 제목 *</label>
                    <input type="text" id="journalTitle" placeholder="상담 주제를 간략하게 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>상담 내용 *</label>
                    <textarea id="journalContent" placeholder="상담 내용을 상세히 기록하세요..." required></textarea>
                </div>
                <div class="form-group">
                    <label>후속 조치 / 다음 상담 계획</label>
                    <textarea id="journalFollowUp" placeholder="후속 조치 사항이나 다음 상담 계획을 입력하세요..."></textarea>
                </div>
                <div class="form-group">
                    <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
                        <input type="checkbox" id="journalPrivate"> 
                        <span>비공개 (교사만 열람 가능)</span>
                    </label>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeJournalModal()">취소</button>
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 상담일지 상세보기 모달 -->
    <div id="journalDetailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="detailTitle">상담일지 상세</h2>
                <button class="modal-close" onclick="closeDetailModal()">&times;</button>
            </div>
            <div id="journalDetailBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeDetailModal()">닫기</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/counseling-journal.js"></script>
</body>
</html>
